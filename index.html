<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Madimi+One&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <title>Douglas Rafael</title>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="hero-content">
          <div class="hero-text-box">
            <p class="hero-my-name"><strong>Olá, me chamo Douglas</strong></p>
            <h1 class="hero-heading">
              Desenvolvedor Full Stack, unindo <span>lógica</span> e
              <span>criatividade.</span>
            </h1>
          </div>

          <div class="hero-buttons">
            <a href="#" class="btn btn--retangle">
              <div class="btn-content">
                <ion-icon class="btn-icon" name="mail"></ion-icon>
                <p><strong>Entre em contato</strong></p>
              </div>
            </a>
            <a
              href="https://www.linkedin.com/in/douglas-rafaelms/"
              target="_blank"
              class="btn btn--square"
            >
              <div class="btn-content">
                <ion-icon class="btn-icon" name="logo-linkedin"></ion-icon>
              </div>
            </a>
            <a href="#" class="btn btn--square">
              <div class="btn-content">
                <ion-icon class="btn-icon" name="logo-github"></ion-icon>
              </div>
            </a>
            <a href="#" class="btn btn--square">
              <div class="btn-content">
                <ion-icon class="btn-icon" name="logo-instagram"></ion-icon>
              </div>
            </a>
          </div>
        </div>
      </section>

      <section class="projects">
        <div class="projects-content">
          <h2 class="section-title">Projetos</h2>
          <div class="projects-cards">
            <div class="project-card"></div>
          </div>
        </div>
      </section>
    </main>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
